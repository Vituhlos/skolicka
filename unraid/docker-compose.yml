version: '3.8'

services:
  skolicka:
    image: ghcr.io/Vituhlos/skolicka:latest  # nahraď Vituhlos svým GitHub username
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PARENT_PIN_HASH: ${PARENT_PIN_HASH}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ${APPDATA_PATH:-/mnt/user/appdata/skolicka}/db:/data
      - ${APPDATA_PATH:-/mnt/user/appdata/skolicka}/uploads:/app/uploads
    restart: unless-stopped
